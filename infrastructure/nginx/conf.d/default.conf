# Edge reverse proxy: routes the browser app and the API behind one origin.
# Keeps cookies first-party and avoids CORS in production. The API prefix here
# must match API_PREFIX in the environment (/api).

upstream dcip_web {
    server web:80;
}

upstream dcip_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    # Backend API.
    location /api/ {
        proxy_pass http://dcip_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }

    # Browser application (static SPA).
    location / {
        proxy_pass http://dcip_web;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
